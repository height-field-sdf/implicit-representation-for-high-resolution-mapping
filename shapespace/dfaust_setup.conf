
train{
    d_in = 3
    plot_frequency = 10000
    checkpoint_frequency = 500
    status_frequency = 100
    preprocess = True
    latent_size = 256
    dataset_path = /path/to/your/dataset
    dataset = datasets.dfaustdataset.DFaustDataSet
    weight_decay = 0
    learning_rate_schedule = [{
                                "Type" : "Step",
			                    "Initial" : 0.005,
			                    "Interval" : 500,
			                    "Factor" : 0.5
			                    },
                                {
                                "Type" : "Step",
                                "Initial" : 0.001,
                                "Interval" : 500,
                                "Factor" : 0.5
                                }]
    network_class = model.network.ImplicitNet
}

plot{
resolution = 512
mc_value = 0.0
is_uniform_grid = True
verbose = False
save_html =False
save_ply = False
save_npz = False
overwrite = True
}
network{
    inputs{
        dims = [ 512, 512, 512, 512, 512, 512, 512, 512 ]
        skip_in = [4]
        geometric_init= True
        radius_init = 1
        beta=100
    }
    sampler{
        sampler_type = NormalPerPoint
        properties{
            global_sigma = 1.8
            local_sigma = 0.01
            }
        }
    loss{
        lambda = 0.1
        normals_lambda = 0
        latent_lambda = 1e-3
    }
}
